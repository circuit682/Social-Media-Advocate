services:
  app:
    build: .
    depends_on:
      - mongo
      - redis
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/social_media_advocate
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PRICE_THRESHOLD_USD: 50
      HIGH_VALUE_GEOS: US,UK,CA
      MAX_TOUCHES_PER_7_DAYS: 3
      RETENTION_CRON: 0 3 * * *
      INTERNAL_API_KEY: internal-dev-key
      SYSTEM_ADMIN_TOKEN: system-dev-token
      HUMAN_ADMIN_TOKEN: human-dev-token
    command: npm run start

  worker:
    build: .
    depends_on:
      - mongo
      - redis
    environment:
      MONGO_URI: mongodb://mongo:27017/social_media_advocate
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PRICE_THRESHOLD_USD: 50
      HIGH_VALUE_GEOS: US,UK,CA
      MAX_TOUCHES_PER_7_DAYS: 3
      RETENTION_CRON: 0 3 * * *
      INTERNAL_API_KEY: internal-dev-key
      SYSTEM_ADMIN_TOKEN: system-dev-token
      HUMAN_ADMIN_TOKEN: human-dev-token
    command: npm run worker

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  mongo_data:
